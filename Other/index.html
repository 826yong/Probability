<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文學與音樂賞析--期中</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <div class="intro">
            倉木麻衣 Mai Kuraki -- Try again
        </div>

        <div class="audio_area">
            
            <audio controls>
                <source src="TRY_AGAIN.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            
            <div>
                <a href="#" onclick="openPopup(event)" class="btn">Youtube</a>
            </div>
        </div>

        <div class="poem">

            <p><span>指引 若隱若現</span></p>
            <p><span>而我 躊躇不前</span></p>
            <p><span>它曾 十分燦爛</span></p>
            <p><span>何時 不再耀眼</span></p>

            <br>

            <p style="color:rgb(213, 235, 255)">我<span>仰望那 蔚藍穹蒼</span></p>
            <p>還<span>渴望能 展翅翱翔</span></p>
            <p>不<span>停地 舞動著翅膀</span></p>
            <p style="color: rgb(170, 169, 169);">想<span>掙脫這 萬丈深潭</span></p>
            <p>放<span>下一身 厚重行囊</span></p>
            <p>氣<span>充志定 背水一戰</span></p>

            <br>

            <p><span>磨損的夢想</span></p>
            <p><span>心跳的迴響</span></p>
            <p><span>撕裂沉悶的水面</span></p>
            <p><span>前方依然不見光</span></p>
            <p><span style="color: rgb(252, 250, 200);">但已不如以往黯淡</span></p>
        </div>

        <div class="me">
            ACS112107 張詠貽《裂光》<br>
            類別：自我對話
        </div>
        
    </div>

</body>
</html>
